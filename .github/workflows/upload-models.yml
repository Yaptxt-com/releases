name: Upload Model Files

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create models release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: 'tags/models' });
            } catch (_) {}
            try {
              const releases = await github.rest.repos.listReleases({ owner, repo });
              for (const r of releases.data) {
                if (r.tag_name === 'models') {
                  await github.rest.repos.deleteRelease({ owner, repo, release_id: r.id });
                }
              }
            } catch (_) {}
            const { data } = await github.rest.repos.createRelease({
              owner, repo,
              tag_name: 'models',
              name: 'Model Files',
              body: 'Hosted model files for Yaptxt auto-download.',
              draft: false,
              prerelease: false,
            });
            return data.upload_url;
          result-encoding: string

      - name: Download parakeet-v3
        run: |
          echo "Downloading parakeet-v3-int8.tar.gz (~456MB)..."
          curl -L --progress-bar -o parakeet-v3-int8.tar.gz \
            "https://blob.handy.computer/parakeet-v3-int8.tar.gz"
          echo "Download complete: $(du -sh parakeet-v3-int8.tar.gz | cut -f1)"

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "models" parakeet-v3-int8.tar.gz \
            --repo Yaptxt-com/releases --clobber
          echo "Upload complete."
