name: Upload Model Files

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Create models release tag
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.git.deleteRef({ owner: 'Yaptxt-com', repo: 'releases', ref: 'tags/models' });
            } catch (_) {}
            const { data } = await github.rest.repos.createRelease({
              owner: 'Yaptxt-com', repo: 'releases',
              tag_name: 'models', name: 'Model Files',
              body: 'Hosted model files for Yaptxt auto-download.',
              draft: false, prerelease: false,
            });
            return data.id;
          result-encoding: string

      - name: Download and upload parakeet-v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.create-release.outputs.result }}
        run: |
          echo "Downloading parakeet-v3-int8.tar.gz (~456MB)..."
          curl -L -o parakeet-v3-int8.tar.gz \
            "https://blob.handy.computer/parakeet-v3-int8.tar.gz"

          echo "Uploading to GitHub Release..."
          gh release upload "models" parakeet-v3-int8.tar.gz \
            --repo Yaptxt-com/releases --clobber
